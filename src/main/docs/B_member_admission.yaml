openapi: 3.0.3
info:
  title: B - Member Admission
  version: 1.0.0
paths:
  /members:
    post:
      summary: Admit a new member into a collectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, birthDate, gender, address, job, phone, email, sponsorId, payment]
              properties:
                firstName: { type: string }
                lastName: { type: string }
                birthDate: { type: string, format: date }
                gender: { type: string, enum: [F, M] }
                address: { type: string }
                job: { type: string }
                phone: { type: string }
                email: { type: string }
                sponsorId: { type: string }
                payment:
                  type: object
                  properties:
                    amount: { type: number, example: 50000 }
                    method: { type: string, enum: [mobile_money, bank_transfer] }
      responses:
        "201":
          description: Member admitted